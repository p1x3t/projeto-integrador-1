<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zanza - Área do Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --pantone-pink: #C21E56;
            --bg-green: #6faf8f;
            --white: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-green);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: var(--white);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            color: var(--pantone-pink);
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--text-sub);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            background: #f8fafc;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--pantone-pink);
            box-shadow: 0 0 0 4px rgba(194, 30, 86, 0.1);
        }

        .esqueceu-link {
            font-size: 12px;
            display: block;
            text-align: right;
            margin-top: 5px;
            margin-bottom: 15px;
            color: var(--text-sub);
            text-decoration: none;
            cursor: pointer;
        }

        .btn-principal {
            width: 100%;
            padding: 16px;
            background: var(--pantone-pink);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn-principal:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 13px;
        }

        .footer-links a {
            color: var(--pantone-pink);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">Zanza</div>
        
        <div id="section-login">
            <p class="subtitle">Entre para agendar seu horário</p>
            <form id="loginFormCliente">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <a class="esqueceu-link" onclick="mostrarEsqueci()">Esqueceu sua senha?</a>
                </div>
                <button type="submit" class="btn-principal">Entrar</button>
            </form>
            <div class="footer-links">
                <p>Não tem conta? <a onclick="mostrarCadastro()">Cadastre-se aqui</a></p>
                <a href="index.html" style="color: #94a3b8; display: block; margin-top: 15px;">← Voltar</a>
            </div>
        </div>

        <div id="section-cadastro" class="hidden">
            <p class="subtitle">Crie sua conta em segundos</p>
            <form id="registerFormCliente">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="reg-nome" placeholder="Seu nome" required>
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="reg-email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label>WhatsApp</label>
                    <input type="text" id="reg-whatsapp" placeholder="(00) 00000-0000" required>
                </div>
                <div class="form-group">
                    <label>Crie uma Senha</label>
                    <input type="password" id="reg-senha" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-principal">Criar Conta</button>
            </form>
            <div class="footer-links">
                <p>Já tem conta? <a onclick="voltarAoLogin()">Fazer Login</a></p>
            </div>
        </div>

        <div id="section-esqueci" class="hidden">
            <p class="subtitle">Redefina sua senha de acesso</p>
            <div class="form-group">
                <label>Seu E-mail cadastrado</label>
                <input type="email" id="reset-email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Nova Senha</label>
                <input type="password" id="reset-nova-senha" placeholder="Mínimo 4 caracteres" required>
            </div>
            <button onclick="redefinirSenha()" class="btn-principal">Atualizar Senha</button>
            <div class="footer-links">
                <p><a onclick="voltarAoLogin()">Voltar para o Login</a></p>
            </div>
        </div>
    </div>

    <script>
        // --- FUNÇÕES DE NAVEGAÇÃO DA TELA ---
        function mostrarCadastro() {
            document.getElementById('section-login').classList.add('hidden');
            document.getElementById('section-esqueci').classList.add('hidden');
            document.getElementById('section-cadastro').classList.remove('hidden');
        }

        function mostrarEsqueci() {
            document.getElementById('section-login').classList.add('hidden');
            document.getElementById('section-cadastro').classList.add('hidden');
            document.getElementById('section-esqueci').classList.remove('hidden');
        }

        function voltarAoLogin() {
            document.getElementById('section-cadastro').classList.add('hidden');
            document.getElementById('section-esqueci').classList.add('hidden');
            document.getElementById('section-login').classList.remove('hidden');
        }

        // --- LÓGICA DE LOGIN ---
        document.getElementById('loginFormCliente').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, tipo: 'cliente' })
            });

            const data = await response.json();
            if (data.success) {
                window.location.href = 'cliente.html'; 
            } else {
                alert(data.message || "Erro ao entrar. Verifique seus dados.");
            }
        });

        // --- LÓGICA DE CADASTRO ---
        document.getElementById('registerFormCliente').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dados = {
                nome: document.getElementById('reg-nome').value,
                email: document.getElementById('reg-email').value,
                senha: document.getElementById('reg-senha').value,
                whatsapp: document.getElementById('reg-whatsapp').value
            };

            const response = await fetch('/api/registrar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            const data = await response.json();
            if (data.success) {
                alert("Cadastro realizado! Agora faça seu login.");
                voltarAoLogin();
            } else {
                alert("Erro: " + (data.message || "Não foi possível cadastrar."));
            }
        });

        // --- LÓGICA DE REDEFINIR SENHA ---
        async function redefinirSenha() {
            const email = document.getElementById('reset-email').value;
            const novaSenha = document.getElementById('reset-nova-senha').value;

            if (!email || !novaSenha) return alert("Preencha todos os campos!");

            const response = await fetch('/api/redefinir-senha', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, novaSenha })
            });

            const data = await response.json();
            if (data.success) {
                alert("Senha atualizada com sucesso! Use a nova senha para entrar.");
                voltarAoLogin();
            } else {
                alert(data.message || "Erro ao atualizar senha.");
            }
        }
    </script>
</body>
</html>
