<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zanza - Área da Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --pantone-pink: #C21E56;
            --pink-light: #fdd8ec;
            --bg-green: #6faf8f;
            --white: #ffffff;
            --text-main: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-green);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .auth-card {
            background: var(--white);
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            color: var(--pantone-pink);
            margin-bottom: 10px;
        }

        /* Abas Login/Cadastro */
        .auth-tabs {
            display: flex;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 14px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            color: #64748b;
            background: transparent;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--white);
            color: var(--pantone-pink);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Formulários */
        .auth-form { display: none; text-align: left; }
        .auth-form.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            background: #f8fafc;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--pantone-pink);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(194, 30, 86, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--pantone-pink);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .back-link {
            display: block;
            margin-top: 25px;
            font-size: 13px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo">Zanza.</div>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">Sua beleza em boas mãos.</p>

        <div class="auth-tabs">
            <button class="tab-btn active" onclick="switchTab('login', this)">Entrar</button>
            <button class="tab-btn" onclick="switchTab('cadastro', this)">Cadastrar</button>
        </div>

        <form id="form-login" class="auth-form active">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Entrar na Área da Cliente</button>
        </form>

        <form id="form-cadastro" class="auth-form">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" placeholder="Como quer ser chamada?">
            </div>
            <div class="form-group">
                <label>WhatsApp</label>
                <input type="tel" placeholder="(00) 00000-0000">
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Crie uma Senha</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">Criar Minha Conta</button>
        </form>

        <a href="index.html" class="back-link">← Voltar</a>
    </div>

<script>
    // Função para alternar entre Entrar e Cadastrar
    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        document.getElementById('form-' + tab).classList.add('active');
    }

    // --- LÓGICA DE LOGIN ---
    document.getElementById('form-login').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Buscando inputs dentro deste formulário específico
        const email = e.target.querySelector('input[type="email"]').value;
        const senha = e.target.querySelector('input[type="password"]').value;

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha, tipo: 'cliente' })
            });

            const data = await response.json();
            if (data.success) {
                window.location.href = data.redirect; 
            } else {
                alert(data.message);
            }
        } catch (error) {
            alert("Erro ao conectar com o servidor.");
        }
    });

    // --- LÓGICA DE CADASTRO (CRIAR CONTA) ---
    document.getElementById('form-cadastro').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Pegando os campos na ordem em que aparecem no seu HTML
        const inputs = e.target.querySelectorAll('input');
        const nome = inputs[0].value;
        const whatsapp = inputs[1].value;
        const email = inputs[2].value;
        const senha = inputs[3].value;

        try {
            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    nome, 
                    email, 
                    senha, 
                    whatsapp, 
                    tipo: 'cliente' 
                })
            });

            const data = await response.json();

            if (data.success) {
                alert("Conta criada com sucesso! Agora você já pode entrar.");
                // Força a volta para a aba de login para ela logar
                location.reload(); 
            } else {
                alert(data.message || "Erro ao criar conta.");
            }
        } catch (error) {
            console.error("Erro no cadastro:", error);
            alert("Erro ao conectar com o servidor.");
        }
    });
</script>

</body>
</html>
