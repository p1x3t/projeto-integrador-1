<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Zanza</title>
    <style>
        body { font-family: sans-serif; background: #fdf2f8; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #db2777; }
        .btn { display: block; width: 250px; padding: 15px; margin: 10px auto; border-radius: 10px; text-decoration: none; color: white; font-weight: bold; }
        .cliente { background: #db2777; }
        .admin { background: #444; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Zanza</h1>
        <a href="/cliente" class="btn cliente">🙋‍♀️ Área da Cliente</a>
        <a href="/admin" class="btn admin">⚙️ Painel Admin</a>
    </div>
</body>
</html>
